number:
  - platform: template
    id: eltek_voltage
    name: "FP2 set voltage"
    device_class: voltage
    unit_of_measurement: "V"
    update_interval: 5s
    restore_value: true
    min_value: 52.80
    max_value: 56.00
    step: 0.1
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda:  |-
            id(voltage_set)=x;
            id(count)=61;
          
  - platform: template
    id: eltek_current
    name: "FP2 set current"
    device_class: current
    unit_of_measurement: "A"
    update_interval: 5s
    restore_value: true
    min_value: 1 #0.10
    max_value: 41 #41.70
    step: 1.0
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda:  |-
            id(current_set)=x;
            id(count)=61;

  - platform: template
    id: default_voltage
    name: "FP2 default voltage"
    device_class: voltage
    unit_of_measurement: "V"
    update_interval: 5s
    restore_value: true
    min_value: 52.80 #43.70
    max_value: 56.00 #57.60
    step: 0.1
    optimistic: true
    mode: box
    on_value:
      then:
        - canbus.send:
            use_extended_id: true
            can_id: 0x05004804
            canbus_id: eltek
            data: !lambda |-
              return std::vector<uint8_t>(id(serial_number), id(serial_number) + 8);
        - canbus.send:
            use_extended_id: true
            can_id: 0x05019C00
            data: !lambda |-
              ESP_LOGI("canbus", "Setting default voltage to %.1f (%.2f + %.2f)", x, x-id(offset_voltage).state, id(offset_voltage).state);
              uint16_t voltage = (uint16_t) ((x-id(offset_voltage).state) * 100); //convert the voltage to an integer and multiply by 100
              uint8_t data[5] = {0x29, 0x15, 0x00, (uint8_t) (voltage & 0xFF), (uint8_t) (voltage >> 8)}; //set the data array with the voltage in hex
              return std::vector<uint8_t>(data, data + 5); //convert the array to a vector and return it
  - platform: template
    id: offset_voltage
    name: "FP2 offset voltage"
    icon: "mdi:tune"
    entity_category: "config"
    device_class: voltage
    unit_of_measurement: "V"
    update_interval: 5s
    initial_value: 0
    restore_value: true
    min_value: -0.50
    max_value: 0.50
    step: 0.01
    optimistic: true
    mode: box

switch:
  - platform: restart
    name: "ESPhome FP2 restart"

binary_sensor:
  - platform: template
    name: "Current limiting active"
    lambda: |-
      if (id(current_limiting)) {
        return true;
      } else {
        return false;
      }
  - platform: gpio
    pin: 
      number: GPIO3
      inverted: true
    id: button
    on_multi_click:
    - timing:
        - ON for at most 350ms
        - OFF for at least 0.5s
      then:
        - if:
            condition:
              lambda: 'return id(mode) == 0;'
            then:
              - lambda: |-
                  id(mode)=1;
                  ESP_LOGI("main", "Current Set mode");
            else:
              - if:
                  condition:
                    lambda: 'return id(mode) == 1;'
                  then:
                    - lambda: |-
                        id(mode)=0;
                        ESP_LOGI("main", "Current Set [%4.1f] A", id(current_set));
                        auto call = id(eltek_current).make_call();
                        call.set_value(id(current_set));
                        call.perform();
              - if:
                  condition:
                    lambda: 'return id(mode) == 2;'
                  then:
                    - lambda: |-
                        id(mode)=0;
                        ESP_LOGI("main", "Voltage Set [%4.1f] V (%.2f + %.2f)", id(voltage_set), id(voltage_set)-id(offset_voltage).state, id(offset_voltage).state);
                        auto call = id(eltek_voltage).make_call();
                        call.set_value(id(voltage_set));
                        call.perform();
              - if:
                  condition:
                    lambda: 'return id(mode) == 3;'
                  then:
                    - lambda: |-
                        id(mode)=0;
                        ESP_LOGI("light", "Brigtness Set [%d]%%", id(brightness));
    - timing:
        - ON for at most 350ms
        - OFF for at most 350ms
        - ON for at most 350ms
        - OFF for at least 0.5s
      then:
        - if:
            condition:
              lambda: 'return id(mode) == 0;'
            then:
              - lambda: |-
                  id(mode)=2;
                  ESP_LOGI("main", "Voltage Set mode");
    - timing:
        - ON for 1s to 3s
        - OFF for at least 0.5s
      then:
        - if:
            condition:
              lambda: 'return id(mode) == 0;'
            then:
              - lambda: |-
                  id(mode)=3;
                  ESP_LOGI("light", "Brigtness Set mode");

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP32 IP Address
